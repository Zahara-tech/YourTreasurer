<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourTreasurer | Interval Spend</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Logo removed as requested -->

    <button class="menu-trigger" id="menu-btn">
        <span>☰ Menu</span>
    </button>

    <div class="menu-backdrop" id="menu-backdrop"></div>

     <nav id="side-nav" class="side-nav">
        <button class="close-btn" id="close-btn">&times;</button>
        <div class="nav-links">
            <a href="/" data-bg="{{ url_for('static', filename='images/bg.svg') }}">Home</a>
            <a href="/my_profile" data-bg="{{ url_for('static', filename='images/profile.jpg') }}">My Profile</a>
            <a href="/my_expenses" data-bg="{{ url_for('static', filename='images/expenses.avif') }}">My Expenses</a>
            <a href="/analysis" data-bg="{{ url_for('static', filename='images/Analysis.jpg') }}">Analysis</a>
            <a href="/interval_spend" data-bg="{{ url_for('static', filename='images/interval.jpg') }}">Interval Spend</a>
            <a href="/about_us" data-bg="{{ url_for('static', filename='images/aboutus.png') }}">About Us</a>
        </div>
    </nav>

    <div id="dynamic-bg" class="dynamic-bg" style="background-image: url('{{ url_for('static', filename='images/interval.jpg') }}');"></div>
    <div id="hover-bg" class="dynamic-bg hover-layer"></div>

    <div class="main-layout-wrapper">
        <div class="content-container">
            <h1 class="title">Interval Spend Manager</h1>
            <p class="subtitle">Manage your recurring expenses</p>
            
            <!-- Add Interval Spend Form -->
            <div class="interval-form">
                <h2>Add Recurring Payment</h2>
                <form action="/add_interval_spend" method="POST">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="payment_name">Payment Name</label>
                            <input type="text" id="payment_name" name="payment_name" placeholder="e.g., Hostel Rent" required>
                        </div>
                        <div class="form-group">
                            <label for="amount">Amount ($)</label>
                            <input type="number" id="amount" name="amount" min="0" step="0.01" required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="due_date">Next Due Date</label>
                            <input type="date" id="due_date" name="due_date" required>
                        </div>
                        <div class="form-group">
                            <label for="frequency">Frequency</label>
                            <select id="frequency" name="frequency" required>
                                <option value="monthly">Monthly</option>
                                <option value="quarterly">Quarterly</option>
                                <option value="yearly">Yearly</option>
                                <option value="weekly">Weekly</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="reminder_days">Remind me (days before)</label>
                            <input type="number" id="reminder_days" name="reminder_days" min="1" max="30" value="3" required>
                        </div>
                        <div class="form-group">
                            <label for="category">Category</label>
                            <select id="category" name="category" required>
                                <option value="Hostel Rent">Hostel Rent</option>
                                <option value="EMI">EMI</option>
                                <option value="Subscription">Subscription</option>
                                <option value="Educational">Educational</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-primary">Add Recurring Payment</button>
                </form>
            </div>
            
            <!-- Upcoming Payments -->
            <div class="upcoming-payments">
                <h2>Upcoming Payments</h2>
                <div id="payments-container">
                    <!-- Payments will be loaded here dynamically -->
                    <p class="no-payments">No recurring payments set up yet.</p>
                </div>
            </div>
        </div>
    </div>
    
    <footer class="common-footer">
        YourTreasurer &copy; 2026 | Helping Hand
    </footer>

    <script>
        const menuBtn = document.getElementById('menu-btn');
        const closeBtn = document.getElementById('close-btn');
        const sideNav = document.getElementById('side-nav');
        const backdrop = document.getElementById('menu-backdrop');
        
        const mainBg = document.getElementById('dynamic-bg');
        const hoverBg = document.getElementById('hover-bg');
        const navLinks = document.querySelectorAll('.nav-links a');
        
        // Set default background
        const defaultBg = "{{ url_for('static', filename='images/interval.jpg') }}";
        mainBg.style.backgroundImage = `url(${defaultBg})`;

        function toggleMenu() {
            sideNav.classList.toggle('open');
            backdrop.classList.toggle('active');
            if (sideNav.classList.contains('open')) {
                document.body.style.position = 'fixed';
                document.body.style.width = '100%';
            } else {
                document.body.style.position = '';
                hoverBg.style.opacity = '0';
            }
        }

        // --- Hover Animation Logic ---
        navLinks.forEach(link => {
            link.addEventListener('mouseenter', () => {
                const newImg = link.getAttribute('data-bg');
                hoverBg.style.backgroundImage = `url(${newImg})`;
                hoverBg.style.opacity = '1';
            });

            link.addEventListener('mouseleave', () => {
                hoverBg.style.opacity = '0';
            });
        });

        menuBtn.addEventListener('click', toggleMenu);
        closeBtn.addEventListener('click', toggleMenu);
        backdrop.addEventListener('click', toggleMenu);
    </script>
</body>
</html>
